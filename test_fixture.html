<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TEST</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="orig"></div>
<script>
// --- фикстуры: имитация JSON swgoh.gg ---
const guildJson = {
  data: {
    guild_id: 'TESTGUILDID123',
    name: 'Тестовая Гильдия',
    galactic_power: 2400000000,
    member_count: 8,
    members: [
      { player_name: 'Alpha',  ally_code: 111111111, galactic_power: 330000000 },
      { player_name: 'Bravo',  ally_code: 222222222, galactic_power: 285000000 },
      { player_name: 'Charlie',ally_code: 333333333, galactic_power: 240000000 },
      { player_name: 'Delta',  ally_code: 444444444, galactic_power: 210000000 },
      { player_name: 'Echo',   ally_code: 555555555, galactic_power: 180000000 },
      { player_name: 'Foxtrot',ally_code: 666666666, galactic_power: 165000000 },
      { player_name: 'Golf',   ally_code: 777777777, galactic_power: 150000000 },
      { player_name: 'Hotel',  ally_code: 888888888, galactic_power: 126000000 },
    ],
  },
};
function playerJson(name, ally, units, gps) {
  return { data: Object.assign({ name, ally_code: ally }, gps || {}), units: units.map(u => ({ data: u })) };
}
// режим малой гильдии: ограничиваем ёмкость фазы, чтобы проверить выбор 2★ вместо 3★
const LOWGP = location.search.includes('lowgp');
if (LOWGP) {
  const factor = 0.17; // сумма ~1686M → ~287M, ёмкость фазы при 90% ≈ 258M
  for (const m of guildJson.data.members) m.galactic_power = Math.round(m.galactic_power * factor);
  guildJson.data.galactic_power = guildJson.data.members.reduce((s, m) => s + m.galactic_power, 0);
}
// GP-разбивка ростеров Alpha/Bravo — согласуем с ГП участника (иначе sync перезапишет lowgp)
function gpSplit(ally) {
  const m = guildJson.data.members.find(x => x.ally_code === ally);
  const g = m ? m.galactic_power : 0;
  return { galactic_power: g, character_galactic_power: Math.round(g * 0.55), ship_galactic_power: Math.round(g * 0.45) };
}
window.__GP1 = gpSplit(111111111);
window.__GP2 = gpSplit(222222222);
// план фазы 1: Мустафар 3★ (закрыт), Корусант 1★+перенос, Кореллия 0★ →
// в фазе 2 Фелуция (смешанный путь) должна быть 🔒 заблокирована
if (location.search.includes('optimize')) {
  localStorage.removeItem('tbp_plan'); // оптимизатор строит план с нуля
} else {
  localStorage.setItem('tbp_plan', JSON.stringify({
    1: {
      '111111111': 'mustafar', '222222222': 'mustafar',   // 615 млн → ★★★, закрыта
      '333333333': 'coruscant',                           // 240 млн → ★★, закрыта (добрать нельзя!)
    },
    2: { '555555555': 'geonosis', '666666666': 'bracca', '777777777': 'corellia' },
  }));
}
const p1 = playerJson('Alpha', 111111111, [
  { name: 'Darth Traya', combat_type: 1, relic_tier: 9, rarity: 7 },   // R7
  { name: 'Emperor Palpatine', combat_type: 1, relic_tier: 11, rarity: 7 }, // R9
  { name: 'Chimaera', combat_type: 2, rarity: 7 },
  { name: "Hound's Tooth", combat_type: 2, rarity: 7 },
  { name: 'Darth Revan', combat_type: 1, relic_tier: 7, rarity: 7 },   // R5
], window.__GP1);
const p2 = playerJson('Bravo', 222222222, [
  { name: 'Darth Traya', combat_type: 1, relic_tier: 7, rarity: 7 },   // R5
  { name: 'Chimaera', combat_type: 2, rarity: 6 },                      // не 7*
  { name: 'General Grievous', combat_type: 1, relic_tier: 9, rarity: 7 },
], window.__GP2);
// прогоняем через реальный код приложения: заполняем поля ручного импорта после загрузки
window.__TEST__ = { guildJson, players: [p1, p2] };

// ростеры всех 8 игроков для проверки автозагрузки (p1/p2 — с юнитами для платунов)
const rosterByAlly = { '111111111': p1, '222222222': p2 };
for (const m of guildJson.data.members) {
  if (!rosterByAlly[m.ally_code]) {
    rosterByAlly[m.ally_code] = playerJson(m.player_name, m.ally_code,
      [{ name: 'Darth Traya', combat_type: 1, relic_tier: 7, rarity: 7 }],
      { galactic_power: m.galactic_power,
        character_galactic_power: Math.round(m.galactic_power * 0.55),
        ship_galactic_power: Math.round(m.galactic_power * 0.45) });
  }
}
// режим сбоя: без моста и с падающим fetch к swgoh/прокси — проверяем авто-раскрытие ручного импорта
if (location.search.includes('failguild')) {
  const realFetch = window.fetch.bind(window);
  window.fetch = (u, o) => {
    const s = typeof u === 'string' ? u : (u && u.url) || '';
    if (/swgoh\.gg|corsproxy|allorigins|codetabs/.test(s)) return Promise.reject(new Error('network blocked (test)'));
    return realFetch(u, o);
  };
} else
// эмуляция юзерскрипта-моста (swgoh_bridge.user.js): отвечает на ping и fetch
window.addEventListener('message', ev => {
  if (!ev.data) return;
  if (ev.data.type === 'swgoh-bridge-ping') {
    window.postMessage({ type: 'swgoh-bridge-ready', version: 'test' }, '*');
  } else if (ev.data.type === 'swgoh-bridge-fetch') {
    let body = guildJson;
    const pm = ev.data.url.match(/\/api\/player\/(\d+)\//);
    if (pm) body = rosterByAlly[pm[1]] || p1;
    window.postMessage({
      type: 'swgoh-bridge-result', id: ev.data.id,
      status: 200, text: JSON.stringify(body),
    }, '*');
  }
});
</script>
<script src="data/tb_data.js"></script>
<script src="js/api.js"></script>
<!-- разметка приложения подгружается из index.html -->
<script>
(async () => {
  const html = await fetch('index.html').then(r => r.text()).catch(() => null);
  if (html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    document.getElementById('orig').replaceWith(doc.querySelector('header'), doc.querySelector('main'), doc.querySelector('footer'));
  }
  const s = document.createElement('script');
  s.src = 'js/app.js';
  s.onload = () => {
    // автозагрузка гильдии по кнопке (мок-мост ответит) → ростеры подгрузятся автоматически
    document.getElementById('guild-url').value = 'https://swgoh.gg/g/HWTOggWMSD6t06XEYD924w/';
    document.getElementById('btn-load-guild').click();
    // переключение вкладки по параметру ?tab=, фазы — ?phase=, оптимизатор — ?optimize=1
    // (импорт гильдии и автозагрузка ростеров асинхронные, поэтому ждём)
    const qs = new URLSearchParams(location.search);
    setTimeout(() => {
      if (qs.get('optimize')) document.getElementById('btn-optimize-all').click();
      const tab = qs.get('tab');
      if (tab) document.querySelector(`[data-tab="${tab}"]`).click();
      const phase = qs.get('phase');
      if (phase) document.querySelectorAll('#planner-phase-picker button')[phase - 1].click();
      document.title = 'TEST-READY';
    }, 1500);
  };
  document.body.append(s);
})();
</script>
</body>
</html>
